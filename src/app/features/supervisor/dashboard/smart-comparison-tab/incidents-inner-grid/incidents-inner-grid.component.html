<div class="card border-0 shadow-sm">
  <div class="pv-inner-grid-header pv-inner-grid-header--incidents">
    <div class="d-flex align-items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
        <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5m.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2"/>
      </svg>
      <div class="pv-inner-grid-title-wrap">
        <span class="pv-inner-grid-label">Incidents</span>
        <span class="pv-inner-grid-subtitle">{{ title }}</span>
      </div>
    </div>
    <button type="button" class="btn-close btn-close-white opacity-75" aria-label="Close" (click)="closed.emit()"></button>
  </div>
  <div class="card-body p-3">
    <app-grid
      [columns]="columns()"
      [rows]="rows()"
      [totalElements]="totalElements()"
      [totalPages]="totalPages()"
      [loading]="loading()"
      (stateChange)="onStateChange($event)"
    />
  </div>
</div>
