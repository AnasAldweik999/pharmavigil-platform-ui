<div class="card border-0 shadow-sm pv-inner-grid-card">
  <div class="pv-inner-grid-header pv-inner-grid-header--products">
    <div class="d-flex align-items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
        <path d="M4.5 5A3.5 3.5 0 0 0 1 8.5a3.5 3.5 0 0 0 3.5 3.5h3.5V5H4.5zm7 0H8v7h3.5A3.5 3.5 0 0 0 15 8.5 3.5 3.5 0 0 0 11.5 5z"/>
      </svg>
      <div class="pv-inner-grid-title-wrap">
        <span class="pv-inner-grid-label">Products</span>
        <span class="pv-inner-grid-subtitle">{{ title }}</span>
      </div>
      @if (loading()) {
        <span class="spinner-border spinner-border-sm text-white opacity-75 ms-1" role="status" aria-hidden="true"></span>
      }
    </div>
    <button type="button" class="btn-close btn-close-white opacity-75" aria-label="Close" (click)="closed.emit()"></button>
  </div>
  <div class="card-body p-3">
    <app-grid
      [columns]="columns()"
      [rows]="rows()"
      [totalElements]="totalElements()"
      [totalPages]="totalPages()"
      [loading]="loading()"
      (stateChange)="onStateChange($event)"
    />
  </div>
</div>
