<div class="card border-0 shadow-sm pv-inner-grid-card">
  <div class="pv-inner-grid-header pv-inner-grid-header--products">
    <div class="d-flex align-items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
        <path d="M4.5 5A3.5 3.5 0 0 0 1 8.5a3.5 3.5 0 0 0 3.5 3.5h3.5V5H4.5zm7 0H8v7h3.5A3.5 3.5 0 0 0 15 8.5 3.5 3.5 0 0 0 11.5 5z"/>
      </svg>
      <div class="pv-inner-grid-title-wrap">
        <span class="pv-inner-grid-label">Products</span>
        <span class="pv-inner-grid-subtitle">{{ title }}</span>
      </div>
      @if (loading()) {
        <span class="spinner-border spinner-border-sm text-white opacity-75 ms-1" role="status" aria-hidden="true"></span>
      }
    </div>
    <button type="button" class="btn-close btn-close-white opacity-75" aria-label="Close" (click)="closed.emit()"></button>
  </div>
  <div class="card-body p-3">
    <app-grid
      [columns]="columns()"
      [rows]="rows()"
      [totalElements]="totalElements()"
      [totalPages]="totalPages()"
      [loading]="loading()"
      [actions]="gridActions"
      (stateChange)="onStateChange($event)"
      (actionClick)="onStopActionClick($event)"
    />
  </div>

  @if (activeStopsUrl()) {
    <div class="border-top">
      <div class="pv-stops-subgrid-header">
        <div class="d-flex align-items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
            <path d="M5 6.5A1.5 1.5 0 0 1 6.5 5h3A1.5 1.5 0 0 1 11 6.5v3A1.5 1.5 0 0 1 9.5 11h-3A1.5 1.5 0 0 1 5 9.5z"/>
          </svg>
          <div class="pv-inner-grid-title-wrap">
            <span class="pv-inner-grid-label">Stops</span>
            <span class="pv-inner-grid-subtitle">{{ stopsTitle() }}</span>
          </div>
          @if (stopsLoading()) {
            <span class="spinner-border spinner-border-sm ms-1" role="status" aria-hidden="true"></span>
          }
        </div>
        <button type="button" class="btn-close" aria-label="Close stops" (click)="activeStopsUrl.set(null)"></button>
      </div>
      <div class="p-3">
        <app-grid
          [columns]="stopsColumns"
          [rows]="stopsRows()"
          [totalElements]="stopsTotal()"
          [totalPages]="stopsPages()"
          [loading]="stopsLoading()"
          (stateChange)="onStopsStateChange($event)"
        />
      </div>
    </div>
  }
</div>
