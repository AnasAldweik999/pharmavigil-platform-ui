<div class="card border-0 shadow-sm pv-inner-grid-card">
  <div class="pv-inner-grid-header pv-inner-grid-header--machines">
    <div class="d-flex align-items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
        <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492M5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0"/>
        <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.892 3.433-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.892-1.64-.901-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.47l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115z"/>
      </svg>
      <div class="pv-inner-grid-title-wrap">
        <span class="pv-inner-grid-label">Machines</span>
        <span class="pv-inner-grid-subtitle">{{ title }}</span>
      </div>
      @if (loading()) {
        <span class="spinner-border spinner-border-sm text-white opacity-75 ms-1" role="status" aria-hidden="true"></span>
      }
    </div>
    <button type="button" class="btn-close btn-close-white opacity-75" aria-label="Close" (click)="closed.emit()"></button>
  </div>
  <div class="card-body p-3">
    <app-grid
      [columns]="columns"
      [rows]="rows()"
      [totalElements]="totalElements()"
      [totalPages]="totalPages()"
      [loading]="loading()"
      [actions]="gridActions"
      (stateChange)="onStateChange($event)"
      (actionClick)="onProductActionClick($event)"
    />
  </div>

  @if (activeProductsUrl()) {
    <div class="border-top">
      <div class="pv-stops-subgrid-header">
        <div class="d-flex align-items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="M0 8a4 4 0 0 1 4-4h8a4 4 0 0 1 0 8H4a4 4 0 0 1-4-4m4-3a3 3 0 0 0 0 6h2.5V5zm3.5 0v6H12a3 3 0 0 0 0-6z"/>
          </svg>
          <div class="pv-inner-grid-title-wrap">
            <span class="pv-inner-grid-label">Products</span>
            <span class="pv-inner-grid-subtitle">{{ productsTitle() }}</span>
          </div>
          @if (productsLoading()) {
            <span class="spinner-border spinner-border-sm ms-1" role="status" aria-hidden="true"></span>
          }
        </div>
        <button type="button" class="btn-close" aria-label="Close products" (click)="activeProductsUrl.set(null)"></button>
      </div>
      <div class="p-3">
        <app-grid
          [columns]="productsColumns"
          [rows]="productsRows()"
          [totalElements]="productsTotal()"
          [totalPages]="productsPages()"
          [loading]="productsLoading()"
          (stateChange)="onProductsStateChange($event)"
        />
      </div>
    </div>
  }
</div>
