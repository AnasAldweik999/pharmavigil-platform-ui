<!-- Mobile overlay — closes sidebar when tapped -->
@if (sidebarOpen()) {
  <div class="sidebar-overlay" (click)="closeSidebar()"></div>
}

<!-- Sidebar -->
<div class="sidebar d-flex flex-column" [class.sidebar-open]="sidebarOpen()">

  <!-- Brand -->
  <div class="pv-sidebar-brand">
    <div class="pv-sidebar-brand-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
        <path d="M5.338 1.59a61 61 0 0 0-2.837.856.48.48 0 0 0-.328.39c-.554 4.157.726 7.19 2.253 9.188a10.7 10.7 0 0 0 2.287 2.233c.346.244.652.42.893.533q.18.085.293.118a1 1 0 0 0 .101.025 1 1 0 0 0 .1-.025q.114-.034.294-.118c.24-.113.547-.29.893-.533a10.7 10.7 0 0 0 2.287-2.233c1.527-1.997 2.807-5.031 2.253-9.188a.48.48 0 0 0-.328-.39c-.651-.213-1.75-.56-2.837-.855C9.552 1.29 8.531 1.067 8 1.067c-.53 0-1.552.223-2.662.524z"/>
      </svg>
    </div>
    <div>
      <div class="pv-sidebar-brand-name">PharmaVigil</div>
      <div class="pv-sidebar-brand-sub">Staff Portal</div>
    </div>
  </div>

  <!-- Nav -->
  <nav class="nav flex-column gap-1 flex-grow-1 px-2 pb-2">
    <a
      routerLink="/staff/reports"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: false }"
      class="nav-link d-flex align-items-center gap-2"
      (click)="closeSidebar()"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
        <path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1z"/>
        <path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5zm-3-1A1.5 1.5 0 0 0 5 1.5H3.5A1.5 1.5 0 0 0 2 3h12a1.5 1.5 0 0 0-1.5-1.5H11A1.5 1.5 0 0 0 9.5 0z"/>
        <path d="M5 8h6v1H5zm0 3h6v1H5zm0-6h6v1H5z"/>
      </svg>
      My Reports
    </a>
  </nav>

  <!-- User -->
  <div class="pv-sidebar-user">
    <div class="pv-user-avatar">{{ initials() }}</div>
    <div class="min-w-0 flex-grow-1">
      <div class="pv-user-name">{{ name() }}</div>
      <div class="pv-user-email">{{ email() }}</div>
    </div>
    <button class="pv-sidebar-logout-btn" (click)="logout()" title="Sign out">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16">
        <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0z"/>
        <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708z"/>
      </svg>
    </button>
  </div>

</div>

<!-- Main content -->
<div class="main-content">
  <div class="top-bar">

    <!-- Left -->
    <div class="d-flex align-items-center gap-2">
      <button
        class="btn btn-sm btn-outline-secondary d-lg-none"
        type="button"
        (click)="toggleSidebar()"
        aria-label="Toggle navigation"
        style="width:34px;height:34px;padding:0;display:flex;align-items:center;justify-content:center;"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5"/>
        </svg>
      </button>
      <span class="pv-topbar-title">Staff Portal</span>
    </div>

    <!-- Right -->
    <div class="d-flex align-items-center gap-2">
      <!-- Desktop: user name + role + avatar -->
      <div class="pv-topbar-user d-none d-lg-flex">
        <div>
          <div class="pv-topbar-name">{{ name() }}</div>
          <div class="pv-topbar-role">Staff</div>
        </div>
        <div class="pv-topbar-avatar">{{ initials() }}</div>
      </div>
      <!-- Mobile: logout icon -->
      <button class="pv-topbar-logout-btn d-lg-none" (click)="logout()" title="Sign out">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0z"/>
          <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708z"/>
        </svg>
      </button>
    </div>

  </div>

  <div class="page-content">
    <router-outlet />
  </div>
</div>

<app-toast-container />
