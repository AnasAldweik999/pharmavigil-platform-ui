<div class="card border-0 shadow-sm">
  <div class="card-body p-4">

    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
      <h5 class="fw-bold mb-0">My Reports</h5>
      <a routerLink="/staff/reports/new" class="btn btn-sm btn-primary">New Report</a>
    </div>

    <app-grid
      [columns]="gridColumns"
      [filterFields]="gridFilters()"
      [actions]="gridActions"
      [actionsDisabled]="!!viewingId()"
      [rows]="rows()"
      [totalElements]="totalElements()"
      [totalPages]="totalPages()"
      [loading]="loading()"
      (stateChange)="onGridStateChange($event)"
      (actionClick)="onGridAction($event)"
    />

  </div>
</div>

<app-report-detail-modal #detailModal />
