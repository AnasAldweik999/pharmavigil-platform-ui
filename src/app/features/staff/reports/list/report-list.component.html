<div class="card border-0 shadow-sm">

  <div class="pv-grid-card-header">
    <div class="d-flex align-items-center gap-2">
      <div class="pv-grid-card-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16">
          <path d="M9.293 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4.707A1 1 0 0 0 13.707 4L10 .293A1 1 0 0 0 9.293 0M9.5 3.5v-2l3 3h-2a1 1 0 0 1-1-1M4.5 9a.5.5 0 0 1 0-1h7a.5.5 0 0 1 0 1zM4 10.5a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5m.5 2.5a.5.5 0 0 1 0-1h4a.5.5 0 0 1 0 1z"/>
        </svg>
      </div>
      <span class="pv-grid-card-title">My Reports</span>
    </div>
    <a routerLink="/staff/reports/new" class="btn btn-sm btn-primary d-flex align-items-center gap-1">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="currentColor" viewBox="0 0 16 16">
        <path d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2"/>
      </svg>
      New Report
    </a>
  </div>

  <div class="card-body p-4">
    <app-grid
      [columns]="gridColumns"
      [filterFields]="gridFilters"
      [actions]="gridActions"
      [actionsDisabled]="!!viewingId()"
      [rows]="rows()"
      [totalElements]="totalElements()"
      [totalPages]="totalPages()"
      [loading]="loading()"
      (stateChange)="onGridStateChange($event)"
      (actionClick)="onGridAction($event)"
    />

  </div>
</div>

<app-report-detail-modal #detailModal />
